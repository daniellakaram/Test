<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub Test</title>
<style>
   body {
     margin: 0;
     font-family: Arial, sans-serif;
     background: linear-gradient(135deg, #003e7e, #257cb6, #00c0f3);
     color: white;
     display: flex;
     justify-content: center;
     align-items: center;
     height: 100vh;
     text-align: center;
   }
   .card {
     background: rgba(255, 255, 255, 0.1);
     padding: 40px;
     border-radius: 16px;
     backdrop-filter: blur(10px);
     box-shadow: 0 10px 30px rgba(0,0,0,0.2);
   }
   h1 {
     margin-bottom: 10px;
     font-size: 36px;
   }
   p {
     opacity: 0.9;
     font-size: 18px;
   }
   .btn {
     margin-top: 20px;
     padding: 10px 20px;
     border: none;
     border-radius: 8px;
     background: white;
     color: #003e7e;
     font-weight: bold;
     cursor: pointer;
   }
   .btn:hover {
     opacity: 0.9;
   }
</style>
</head>
<body>
<div class="card">
<h1>🚀 Repo is Live</h1>
<p>If you can see this, your GitHub repo is working.</p>
<button class="btn" onclick="alert('GitHub is connected!')">
     Test Button
</button>
</div>
</body>
</html>
